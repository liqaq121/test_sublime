name: C++ Build & Release (MSVC + Qt)

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # ⭐必须，否则不能发 Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    # =========================
    # 1. 拉代码
    # =========================
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true

    # =========================
    # 2. MSVC 环境
    # =========================
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        vsversion: 2022

    # =========================
    # 3. Qt
    # =========================
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 5.15.2
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        cache: true

    # =========================
    # 4. Ninja
    # =========================
    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    # =========================
    # 5. Configure
    # =========================
    - name: Configure CMake
      run: cmake --preset x64-release

    # =========================
    # 6. Build
    # =========================
    - name: Build
      run: cmake --build --preset x64-release

    # =========================
    # 7. 找 exe + Qt 部署
    # =========================
    - name: Deploy Qt runtime
      shell: pwsh
      run: |
        # ====== 根据你的项目改这里 ======
        $exe = "bin/release/test.exe"

        echo "EXE=$exe"

        # 确保 windeployqt 可用
        windeployqt $exe

    # =========================
    # 8. 打包 zip
    # =========================
    - name: Package
      shell: pwsh
      run: |
        $outDir = "release_package"
        New-Item -ItemType Directory -Force -Path $outDir

        Copy-Item -Recurse bin/release/* $outDir/

        Compress-Archive -Path $outDir/* -DestinationPath app.zip -Force

    # =========================
    # 9. 上传 Artifact（CI用）
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: app.zip

    # =========================
    # 10. 自动发布 GitHub Release（CD核心）
    # =========================
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: app.zip
        generate_release_notes: true
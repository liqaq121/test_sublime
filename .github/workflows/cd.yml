name: CD - GitHub Release

permissions:
  contents: write

on:
  workflow_run:
    workflows: ["C++ Build (MSVC + Ninja)"]
    types:
      - completed

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
    - name: 下载 CI artifact
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: C++ Build (MSVC + Ninja)
        run_id: ${{ github.event.workflow_run.id }}
        name: target
        path: app
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: 查看产物
      run: ls -R app

    - name: 打包
      run: |
        zip -r app.zip app

    - name: 创建 Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.workflow_run.head_branch }}
        name: Release ${{ github.event.workflow_run.head_branch }}
        files: app.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}